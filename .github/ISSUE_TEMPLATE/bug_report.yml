name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: xsfx version
      placeholder: "0.1.7"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (x86_64)
        - Linux (ARM64)
        - macOS (x86_64)
        - macOS (ARM64 / Apple Silicon)
        - Windows (x86_64)
        - Windows (ARM64)
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `xsfx payload output`
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste any error messages or logs
      render: shell
